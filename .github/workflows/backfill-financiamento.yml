name: Backfill Financiamento

# Reprocessa a coluna aceita_financiamento de todos os imoveis que ja tem
# texto_detalhe_bruto, usando financiamento_heuristica.py (fonte unica
# compartilhada com parser_caixa.py e etapa2_scraper.py). Nao faz nenhum
# request novo a Caixa. dry_run=true (padrao) so relata a contagem de
# mudancas, sem gravar nada no banco.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (nao grava no banco)'
        required: false
        default: 'true'
        type: string

concurrency:
  group: backfill-financiamento
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backfill:
    name: Backfill Financiamento
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Env secrets
        run: |
          cat > scraper/.env << 'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          ENVEOF

      - name: Backfill Financiamento
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" != "false" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          cd scraper && python backfill_financiamento.py $DRY_RUN_FLAG
        env:
          PYTHONUNBUFFERED: "1"
