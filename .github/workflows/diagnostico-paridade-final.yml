name: Diagnostico Paridade Final

# SOMENTE LEITURA - nao grava nada no banco. Item 5 do lote "CSV como
# fonte autoritativa de preco": verificacao de paridade final apos os
# itens 1-4 (divergencia restante, contagem publicada vs leilaoimovel,
# candidatos a stale).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    name: Paridade final
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Rodar paridade final
        run: cd scraper && python diagnostico_paridade_final.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
