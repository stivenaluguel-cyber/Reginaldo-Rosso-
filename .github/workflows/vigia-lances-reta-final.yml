name: Vigia Lances - Reta Final

# CAMADA 2 do vigia-lances (desenho em 2 camadas, aprovado). So imoveis
# Venda Online com data_fim nas proximas 4 horas - deteccao de
# prorrogacao (lance de ultima hora estende o prazo na Caixa) e
# encerramento antecipado. Maximo 10/run, encerramento so por sinal
# explicito (fluxo normal do reconciliar).
#
# CORRIGIDO 2026-07-18: rodava a cada 30min (27 runs/dia) no MESMO
# grupo de concorrencia do scraper-caixa.yml (que ja tem ~50 runs/dia
# por auto-encadeamento) e do vigia-novos.yml (deteccao de encerrados,
# roda so 08h45-11h30 BRT). Resultado medido: vigia-novos teve 5
# execucoes seguidas CANCELADAS antes de comecar (fila do GitHub
# Actions nao espera indefinidamente por um run agendado quando a fila
# esta cheia) — leiloes encerrados pararam de ser detectados por ~27h,
# imovel vendido continuou publicado como disponivel. Reduzido pra a
# cada 2h (8 runs/dia) pra devolver prioridade de fila ao vigia-novos,
# que e mais critico (afeta confianca do usuario em imoveis ja
# vendidos aparecendo como disponiveis).

on:
  schedule:
    # 8h-21h BRT = 11h-00h UTC, de 2 em 2 horas
    - cron: '0 11-23/2 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Mesmo grupo de concorrencia do resto do scraper - serializa, nao
# corre por cima de outra raspagem em andamento (inclusive a camada 1).
concurrency:
  group: scraper-caixa
  cancel-in-progress: false

jobs:
  reta-final:
    name: Reta final - prorrogacao/encerramento
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias Python
        run: cd scraper && pip install -r requirements.txt

      - name: Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Dependencias Node
        run: npm install pg --no-save

      - name: Rodar reta final
        id: reta
        run: cd scraper && python vigia_lances_reta_final.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"

      - name: Gerar paginas HTML (so se houve mudanca)
        if: steps.reta.outputs.mudancas == 'true'
        run: node gerar-imoveis.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Publicar paginas (so se houve mudanca)
        if: steps.reta.outputs.mudancas == 'true'
        run: |
          git config user.name "robo-vigia-lances"
          git config user.email "robo@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "vigia-lances (reta final): prorrogacao/encerramento detectado ($(date +%F\ %H:%M\ UTC))" || echo "Sem mudancas."
          git pull --rebase origin main
          git push
