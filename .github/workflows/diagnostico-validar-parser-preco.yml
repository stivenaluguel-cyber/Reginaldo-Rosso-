name: Diagnostico Validar Parser Preco

# SOMENTE LEITURA - nao grava nada no banco. Valida o parser de preco
# candidato (item 2 do lote "CSV como fonte autoritativa de preco")
# contra texto_detalhe_bruto real ja gravado, antes de ligar em
# etapa2_scraper.py.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    name: Validar parser de preco
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias minimas
        run: pip install psycopg2-binary python-dotenv

      - name: Rodar validacao
        run: cd scraper && python diagnostico_validar_parser_preco.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
