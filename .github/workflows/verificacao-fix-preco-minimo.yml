name: Verificacao Fix Preco Minimo

# Verificacao pontual (uso unico) do fix de update_csv_parsed_bulk:
# roda so a etapa1_csv.py (download+parse+upsert do CSV da Caixa,
# SEM a etapa2 de enriquecimento via Playwright) para confirmar que os
# imoveis com preco_minimo ausente sao reparados. Grupo de concorrencia
# proprio para nao esperar na fila do scraper-caixa.yml completo.

on:
  workflow_dispatch:

concurrency:
  group: verificacao-fix-preco-minimo
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verificar:
    name: Rodar etapa1_csv e reportar antes/depois
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Antes - amostra de 3 IDs
        run: |
          cd scraper && python -c "
          import db
          db.init_db()
          ids = ['1555514517640', '8045600163206', '8444401122345']
          with db.get_connection() as conn:
              cur = conn.cursor()
              cur.execute('SELECT numero_imovel, preco_minimo, preco_avaliacao, modalidade FROM imoveis_caixa WHERE numero_imovel = ANY(%s)', (ids,))
              print('--- ANTES ---')
              for row in cur.fetchall():
                  print(row)
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Rodar etapa1_csv.py
        run: |
          cd scraper && python -c "
          from etapa1_csv import run
          resultado = run()
          print('total_csv:', resultado.get('total_csv'))
          print('estados_ok:', resultado.get('estados_ok'))
          print('estados_falha:', resultado.get('estados_falha'))
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"

      - name: Depois - amostra de 3 IDs + contagem total ainda ausente
        run: |
          cd scraper && python -c "
          import db
          db.init_db()
          ids = ['1555514517640', '8045600163206', '8444401122345']
          with db.get_connection() as conn:
              cur = conn.cursor()
              cur.execute('SELECT numero_imovel, preco_minimo, preco_avaliacao, modalidade FROM imoveis_caixa WHERE numero_imovel = ANY(%s)', (ids,))
              print('--- DEPOIS ---')
              for row in cur.fetchall():
                  print(row)
              cur.execute(\"SELECT COUNT(*) FROM imoveis_caixa WHERE preco_minimo IS NULL OR preco_minimo <= 0\")
              print('total ainda com preco_minimo ausente:', cur.fetchone()[0])
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
