name: Diagnostico Divergencia Preco

# SOMENTE LEITURA - nao grava nada no banco. Dry-run obrigatorio antes do
# fix "CSV como fonte autoritativa de preco": conta quantos imoveis tem
# preco_minimo/preco_avaliacao/modalidade divergente entre o CSV de hoje
# e o banco (nao so os NULL/0, que ja foram tratados num lote anterior).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    name: Diagnostico divergencia preco
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Rodar diagnostico
        run: cd scraper && python diagnostico_divergencia_preco.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
