name: Reverter Falsos-Positivos Gate Antigo

# Uso unico (21/07/2026): reverte 3 imoveis marcados Indisponivel
# incorretamente pelo run reconciliar-stale-pos-fix 29834025377, via o
# gate antigo de _classificar() (token solto "encerrad" em pagina
# transitoria de leilao SFI ja realizado). Confirmados ativos ao vivo
# manualmente antes de rodar isto - ver reverter_falsos_positivos_gate_antigo.py.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reverter:
    name: Reativar os 3 confirmados ao vivo
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Rodar reverter_falsos_positivos_gate_antigo.py
        run: cd scraper && python reverter_falsos_positivos_gate_antigo.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
