name: Diagnostico Gate Antigo Historico

# SOMENTE LEITURA - nao grava nada no banco. Investigacao do achado de
# 21/07/2026: quantos imoveis marcados Indisponivel nos ultimos 30 dias
# batem o padrao suspeito "Leilao SFI com 1o/2o leilao ja passados" no
# snapshot pre-marcacao (mesmo padrao dos 3 falsos-positivos encontrados
# ao vivo no lote atual do reconciliar-stale-pos-fix).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    name: Historico gate antigo (sem escrita)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Rodar diagnostico_gate_antigo_historico.py
        run: cd scraper && python diagnostico_gate_antigo_historico.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
