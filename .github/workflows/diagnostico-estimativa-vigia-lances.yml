name: Diagnostico Estimativa Vigia Lances

# SOMENTE LEITURA - nao grava nada no banco. Insumo pra proposta do
# vigia-lances (item 4, aguardando aprovacao): quantos Venda Online tem
# data_fim, quantos caem na janela de 48h proposta como escopo do cron.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    name: Estimativa vigia-lances
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias minimas
        run: pip install psycopg2-binary python-dotenv

      - name: Rodar estimativa
        run: cd scraper && python diagnostico_estimativa_vigia_lances.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
