name: Backfill Hora Encerramento

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backfill:
    name: Backfill hora padrao em data_fim
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias minimas
        run: pip install psycopg2-binary python-dotenv

      - name: Rodar backfill
        run: cd scraper && python backfill_hora_fim.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
