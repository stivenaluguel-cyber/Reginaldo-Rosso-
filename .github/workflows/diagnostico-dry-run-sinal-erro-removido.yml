name: Diagnostico Dry-Run Sinal Erro Removido

# SOMENTE LEITURA - nao grava nada no banco (nao chama upsert_imovel nem
# mark_unavailable). Mede o impacto do novo sinal SINAIS_ERRO_IMOVEL_REMOVIDO
# em reconciliar_ativos.py::_classificar antes de aprovar qualquer escrita
# real via reconciliar_stale_pos_fix.py.

on:
  workflow_dispatch:

concurrency:
  group: diagnostico-dry-run-sinal-erro-removido
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dry-run:
    name: Dry-run classificacao (sem escrita)
    runs-on: ubuntu-22.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Playwright chromium
        run: cd scraper && python -m playwright install --with-deps chromium

      - name: Rodar diagnostico_dry_run_sinal_erro_removido.py
        run: cd scraper && python diagnostico_dry_run_sinal_erro_removido.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
