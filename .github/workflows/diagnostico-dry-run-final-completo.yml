name: Diagnostico Dry-Run Final Completo

# SOMENTE LEITURA - nao grava nada no banco. Dry-run final (22/07/2026):
# totais CSV/publicaveis RS/SC, suspeitos, fila de enriquecimento por
# campo, e reexecuta a analise de stale + os 6 IDs SFI conhecidos.

on:
  workflow_dispatch:

concurrency:
  group: diagnostico-dry-run-final-completo
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dry-run:
    name: Dry-run final (sem escrita)
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Playwright chromium
        run: cd scraper && python -m playwright install --with-deps chromium

      - name: Rodar diagnostico_dry_run_final_completo.py
        run: cd scraper && python diagnostico_dry_run_final_completo.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
