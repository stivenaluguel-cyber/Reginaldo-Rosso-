name: Diagnostico 2 IDs Orfaos

# SOMENTE LEITURA - nao grava nada no banco. Investiga por que
# 1444407896565 e 1444403309878 (no CSV oficial RS, ficha ativa
# confirmada ao vivo) nunca chegaram ao banco/JSON publicado.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    name: Diagnostico 2 IDs orfaos (sem escrita)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Rodar diagnostico_2_ids_orfaos.py
        run: cd scraper && python diagnostico_2_ids_orfaos.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
