name: Vigia de Imoveis Novos/Encerrados
# CAMADA 2 — VIGIA DA MANHA (novos e removidos)
# Roda das 08h45 ate 11h30 BRT a cada 15 minutos.
# Detecta novos IDs e IDs removidos do CSV da Caixa.
# Se nada mudou, encerra em ~1 min sem raspagem nem commit.

on:
  schedule:
    # 08h45 BRT = 11h45 UTC
    - cron: '45 11 * * *'
    # 09h00-10h45 BRT = 12h00-13h45 UTC (a cada 15 min)
    - cron: '0,15,30,45 12 * * *'
    - cron: '0,15,30,45 13 * * *'
    # 11h00-11h30 BRT = 14h00-14h30 UTC (a cada 15 min)
    - cron: '0,15,30 14 * * *'
  # Disparo manual com 1 clique na aba Actions
  workflow_dispatch:

permissions:
  contents: write

# Evita sobreposicao com a carga noturna e entre runs do vigia.
# Se um run ainda esta rodando, o proximo aguarda.
concurrency:
  group: scraper-caixa
  cancel-in-progress: false

jobs:
  vigia:
    name: Vigia Novos/Encerrados
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias Python
        run: cd scraper && pip install -r requirements.txt

      - name: Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Dependencias Node
        run: npm install pg --no-save

      - name: Env secrets
        run: |
          cat > scraper/.env << 'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          CF_ACCOUNT_ID=${{ secrets.CF_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=us-east-005
          S3_ENDPOINT_URL=https://s3.us-east-005.backblazeb2.com
          S3_BUCKET_NAME=reginaldo-rosso-docs
          CAPTCHA_PROVIDER=capsolver
          CAPSOLVER_API_KEY=${{ secrets.CAPSOLVER_API_KEY }}
          MAX_WORKERS=2
          MAX_RETRIES=3
          HEADLESS=true
          TIMEOUT_MS=60000
          ENVEOF

      - name: Vigia (modo rapido)
        id: vigia
        run: cd scraper && python pipeline.py --vigia
        env:
          PYTHONUNBUFFERED: "1"

      - name: Gerar paginas HTML (so se houver mudancas)
        if: steps.vigia.outputs.mudancas == 'true'
        run: node gerar-imoveis.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Publicar paginas (so se houver mudancas)
        if: steps.vigia.outputs.mudancas == 'true'
        run: |
          git config user.name "robo-vigia"
          git config user.email "robo@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          NOVOS="${{ steps.vigia.outputs.novos }}"
          ENCERRADOS="${{ steps.vigia.outputs.encerrados }}"
          git commit -m "vigia: ${NOVOS} novos, ${ENCERRADOS} encerrados ($(date +%F\ %H:%M\ UTC))" || echo "Sem mudancas."
          git pull --rebase origin main
          git push
