name: Scraper Caixa Economica Federal
# COLETA CONTINUA EDUCADA (base completa)
# Roda a cada 45 min, 24h. Lote pequeno + delay longo entre requests.
# Backlog escoa em 2-3 dias sem disparar o anti-bot; novos do dia saem de manha.

on:
  schedule:
    - cron: '*/45 * * * *'  # a cada 45 min, 24h - ritmo educado
  workflow_dispatch:
    inputs:
      cadeia_num:
        description: "Numero do elo da corrente (auto-encadeamento). Nao mexer manualmente."
        required: false
        default: "1"
      fila_anterior:
        description: "fila_restante do elo anterior (guarda anti-loop). Nao mexer manualmente."
        required: false
        default: ""

permissions:
  contents: read
  actions: write

# Evita sobreposicao: se um run ainda esta rodando, o proximo aguarda.
concurrency:
  group: scraper-caixa
  cancel-in-progress: false

jobs:
  scraper:
    name: Pipeline Caixa
    runs-on: ubuntu-22.04
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Env secrets
        run: |
          cat > scraper/.env << 'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          CF_ACCOUNT_ID=${{ secrets.CF_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=us-east-005
          S3_ENDPOINT_URL=https://s3.us-east-005.backblazeb2.com
          S3_BUCKET_NAME=reginaldo-rosso-docs
          CAPTCHA_PROVIDER=capsolver
          CAPSOLVER_API_KEY=${{ secrets.CAPSOLVER_API_KEY }}
          MAX_WORKERS=2
          MAX_RETRIES=3
          HEADLESS=true
          TIMEOUT_MS=60000
          ETAPA2_BATCH_LIMIT=130
          MATRICULA_BATCH_LIMIT=0
          ENVEOF

      - name: Pipeline
        id: pipeline
        run: cd scraper && python pipeline.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Publicar site (gerar-imoveis)
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "[publicar] Disparando gerar-imoveis.yml para publicar o que este elo coletou..."
          gh workflow run gerar-imoveis.yml --repo "${{ github.repository }}" --ref main || echo "[publicar] Falha ao disparar gerar-imoveis (nao-fatal); workflow_run e cron seguem como backup."

      - name: Auto-encadeamento (elo seguinte se fila > 0)
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_CADEIA: "25"
        run: |
          FILA="${{ steps.pipeline.outputs.fila_restante }}"
          CADEIA="${{ github.event.inputs.cadeia_num }}"
          FILA_ANT="${{ github.event.inputs.fila_anterior }}"
          if [ -z "$CADEIA" ]; then CADEIA=1; fi
          if [ -z "$FILA" ]; then FILA=0; fi
          echo "[cadeia] elo=$CADEIA | fila_restante=$FILA | fila_anterior=${FILA_ANT:-n/a} | max=$MAX_CADEIA"
          if [ "$FILA" -le 0 ]; then
            echo "[cadeia] Fila vazia — corrente encerrada. O cron segue como backup."
            exit 0
          fi
          if [ "$CADEIA" -ge "$MAX_CADEIA" ]; then
            echo "[cadeia] Guarda-corpo: elo $CADEIA >= MAX_CADEIA ($MAX_CADEIA). Nao re-disparando. Cron religa."
            exit 0
          fi
          # Guarda anti-loop (2026-07-18): se a fila NAO diminuiu em relacao ao
          # elo anterior, os itens restantes sao incuraveis NESTE ciclo (pagina
          # sem os dados, ou WAF constante). Sem esta guarda a corrente girava
          # em circulo ate MAX_CADEIA re-raspando os mesmos itens (observado:
          # fila travada em 17 pelos elos 7->8->9), saturando o grupo de
          # concorrencia o dia inteiro e impedindo o vigia-novos de detectar
          # leiloes encerrados. O cron de 45min re-tenta naturalmente depois.
          if [ -n "$FILA_ANT" ] && [ "$FILA" -ge "$FILA_ANT" ]; then
            echo "[cadeia] SEM PROGRESSO: fila $FILA >= anterior $FILA_ANT. Itens incuraveis neste ciclo — corrente encerrada. Cron re-tenta."
            exit 0
          fi
          PROX=$((CADEIA + 1))
          echo "[cadeia] Aguardando ~150s (ritmo educado) antes de disparar elo $PROX..."
          sleep 150
          echo "[cadeia] Disparando elo $PROX (fila ainda em $FILA)."
          gh workflow run scraper-caixa.yml --repo "${{ github.repository }}" --ref main -f cadeia_num="$PROX" -f fila_anterior="$FILA"
