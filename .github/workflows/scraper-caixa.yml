name: Scraper Caixa Economica Federal
# CAMADA 1 — CARGA NOTURNA (base completa)
# Roda entre 01h e 07h Brasília (04h-10h UTC) em 7 runs seguidos.
# Objetivo: garantir que a base esteja 100% raspada/atualizada ANTES das 08h BRT.

on:
  schedule:
    - cron: '0 4 * * *'  # 01:00 BRT
    - cron: '0 5 * * *'  # 02:00 BRT
    - cron: '0 6 * * *'  # 03:00 BRT
    - cron: '0 7 * * *'  # 04:00 BRT
    - cron: '0 8 * * *'  # 05:00 BRT
    - cron: '0 9 * * *'  # 06:00 BRT
    - cron: '0 10 * * *' # 07:00 BRT
  workflow_dispatch:

# Evita sobreposicao: se um run ainda esta rodando, o proximo aguarda.
concurrency:
  group: scraper-caixa
  cancel-in-progress: false

jobs:
  scraper:
    name: Pipeline Caixa
    runs-on: ubuntu-22.04
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Env secrets
        run: |
          cat > scraper/.env << 'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          CF_ACCOUNT_ID=${{ secrets.CF_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=us-east-005
          S3_ENDPOINT_URL=https://s3.us-east-005.backblazeb2.com
          S3_BUCKET_NAME=reginaldo-rosso-docs
          CAPTCHA_PROVIDER=capsolver
          CAPSOLVER_API_KEY=${{ secrets.CAPSOLVER_API_KEY }}
          MAX_WORKERS=2
          MAX_RETRIES=3
          HEADLESS=true
          TIMEOUT_MS=60000
          ETAPA2_BATCH_LIMIT=130
          ENVEOF

      - name: Pipeline
        run: cd scraper && python pipeline.py
        env:
          PYTHONUNBUFFERED: "1"
