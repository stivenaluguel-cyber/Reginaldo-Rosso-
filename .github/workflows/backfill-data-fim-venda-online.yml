name: Backfill data_fim Venda Online

# Uso unico: re-raspa os imoveis modalidade='Venda Online' com data_fim
# NULL (nunca voltam pra fila normal da etapa2, ja tem outros campos
# preenchidos) pra extrair data_fim via data_fim_heuristica (reconhece o
# rotulo "venda online"). Necessario pro countdown ao vivo funcionar
# nesses imoveis. Mesmo pacing anti-WAF do scrape_imovel de producao,
# aborta o lote inteiro se detectar 403/429/bloqueio.

on:
  workflow_dispatch:

concurrency:
  group: backfill-data-fim-venda-online
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backfill:
    name: Re-scrape Venda Online sem data_fim
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Playwright chromium
        run: cd scraper && python -m playwright install --with-deps chromium

      - name: Rodar backfill_data_fim_venda_online.py
        run: cd scraper && python backfill_data_fim_venda_online.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
