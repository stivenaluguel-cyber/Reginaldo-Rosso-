name: Gerar Snapshot Inicial CSV Oficial

# Uso unico (22/07/2026): primeira geracao de csv-oficial-snapshot.json,
# a fonte de verdade da nova regra de vitrine aprovada explicitamente.
# So escreve o arquivo local e commita/publica - NAO toca no banco.

on:
  workflow_dispatch:

concurrency:
  group: gerar-snapshot-inicial
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  gerar:
    name: Gerar e publicar snapshot inicial
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Rodar gerar_snapshot_inicial.py
        run: cd scraper && python gerar_snapshot_inicial.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Publicar csv-oficial-snapshot.json
        run: |
          if [ ! -f csv-oficial-snapshot.json ]; then
            echo "csv-oficial-snapshot.json nao foi gerado - abortando."
            exit 1
          fi
          git config user.name "robo-imoveis"
          git config user.email "robo@users.noreply.github.com"
          git add csv-oficial-snapshot.json
          if git diff --cached --quiet; then
            echo "Sem mudancas em csv-oficial-snapshot.json."
            exit 0
          fi
          git commit -m "chore: gera snapshot inicial do CSV oficial (regra de vitrine)"
          for i in 1 2 3; do
            git push && exit 0
            echo "push falhou (tentativa $i), rebase e retry..."
            git pull --rebase origin main
          done
          echo "::error::Nao foi possivel publicar csv-oficial-snapshot.json apos 3 tentativas."
          exit 1
