name: Diagnostico Dry-Run Stale Completo

# SOMENTE LEITURA - nao grava nada no banco. Dry-run ampliado (21/07/2026)
# pedido para medir quantos dos imoveis "excedentes" (vs Leilao Imovel,
# NAO usado como sinal aqui) sao de fato stale segundo a fonte oficial
# (CSV Caixa + ficha de detalhe), com _classificar ja corrigido (guarda
# SINAIS_LANCE_ATIVO contra o falso-positivo Leilao SFI).

on:
  workflow_dispatch:

concurrency:
  group: diagnostico-dry-run-stale-completo
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dry-run:
    name: Dry-run ampliado (sem escrita)
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Playwright chromium
        run: cd scraper && python -m playwright install --with-deps chromium

      - name: Rodar diagnostico_dry_run_stale_completo.py
        run: cd scraper && python diagnostico_dry_run_stale_completo.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
