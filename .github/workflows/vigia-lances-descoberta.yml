name: Vigia Lances - Descoberta

# CAMADA 1 do vigia-lances (desenho em 2 camadas, aprovado). Roda 2x/dia
# e varre TODOS os Venda Online sem data_fim valida (NULL ou vencida) -
# o widget "Tempo restante" so existe nas ultimas ~48h antes do
# encerramento, entao sem esta varredura periodica a cobertura decai a
# zero conforme o tempo passa. Maximo 40/run, aborta em 429/bloqueio.

on:
  schedule:
    # 08h30 BRT = 11h30 UTC
    - cron: '30 11 * * *'
    # 14h30 BRT = 17h30 UTC
    - cron: '30 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Mesmo grupo de concorrencia do resto do scraper - serializa, nao
# corre por cima de outra raspagem em andamento.
concurrency:
  group: scraper-caixa
  cancel-in-progress: false

jobs:
  descoberta:
    name: Descobrir data_fim de Venda Online
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias Python
        run: cd scraper && pip install -r requirements.txt

      - name: Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Dependencias Node
        run: npm install pg --no-save

      - name: Rodar descoberta
        id: descoberta
        run: cd scraper && python vigia_lances_descoberta.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"

      - name: Gerar paginas HTML (so se houve mudanca)
        if: steps.descoberta.outputs.mudancas == 'true'
        run: node gerar-imoveis.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Publicar paginas (so se houve mudanca)
        if: steps.descoberta.outputs.mudancas == 'true'
        run: |
          git config user.name "robo-vigia-lances"
          git config user.email "robo@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          GANHARAM="${{ steps.descoberta.outputs.ganharam }}"
          git commit -m "vigia-lances (descoberta): ${GANHARAM} imoveis ganharam data_fim ($(date +%F\ %H:%M\ UTC))" || echo "Sem mudancas."
          git pull --rebase origin main
          git push
