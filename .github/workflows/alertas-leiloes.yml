name: Alertas de Leilão (Resend)
# Dispara e-mails de alerta 24h / 4h / 1h antes do encerramento do leilão.
# Roda a cada 30 minutos, com concurrência própria (não colide com scraper-caixa
# nem vigia-novos).

on:
  schedule:
    - cron: '0,30 * * * *'   # a cada 30 minutos, 24h por dia
  workflow_dispatch:          # disparo manual para testes

# Grupo exclusivo — não cancela runs anteriores para evitar duplo envio
concurrency:
  group: alertas-leiloes
  cancel-in-progress: false

jobs:
  alertas:
    name: Disparar alertas de leilão
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Instalar dependências
        run: cd scraper && pip install -r requirements.txt

      - name: Configurar .env
        run: |
          cat > scraper/.env << 'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          SUPABASE_DB_URL=${{ secrets.SUPABASE_DB_URL }}
SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          ENVEOF

      - name: Executar migrate_supabase.py
        run: cd scraper && python migrate_supabase.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Executar enviar_alertas.py
        run: cd scraper && python enviar_alertas.py
        env:
          PYTHONUNBUFFERED: "1"
