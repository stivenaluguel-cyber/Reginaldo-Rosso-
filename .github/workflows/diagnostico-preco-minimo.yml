name: Diagnostico Preco Minimo

# SOMENTE LEITURA - nao grava nada no banco. Investiga a causa raiz dos
# imoveis com preco_minimo ausente/zerado (achado do lote de SEO
# anterior): compara o banco com o CSV mais recente da Caixa e reproduz
# a logica real de parsing/ingestao de etapa1_csv.py.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    name: Diagnostico preco_minimo
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Rodar diagnostico
        run: cd scraper && python diagnostico_preco_minimo.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
