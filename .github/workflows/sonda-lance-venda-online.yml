name: Sonda Lance Venda Online

# Investigacao instrumentada, NAO integra nada ao pipeline. So 2-3
# imoveis Venda Online: registra todas as respostas de rede (XHR/JSON)
# durante o carregamento da pagina de detalhe, procurando o endpoint
# que traz o valor do lance atual. Nao grava nada no banco.

on:
  workflow_dispatch:

concurrency:
  group: sonda-lance-venda-online
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sonda:
    name: Sondar endpoint de lance
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Playwright chromium
        run: cd scraper && python -m playwright install --with-deps chromium

      - name: Rodar sonda
        run: cd scraper && python sonda_lance_venda_online.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
