name: Diagnostico Bug Debito

# SOMENTE LEITURA - nao grava nada no banco. Mede o impacto real do
# hotfix de parser_caixa.py::_parse_debito (commit b1e8a7c53b) sobre
# dados ja gravados, comparando a logica antiga (buggy) com a nova
# (corrigida) sobre o texto_detalhe_bruto de cada imovel.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    name: Diagnostico bug debito
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias minimas
        run: pip install psycopg2-binary python-dotenv

      - name: Rodar diagnostico
        run: cd scraper && python diagnostico_bug_debito.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
