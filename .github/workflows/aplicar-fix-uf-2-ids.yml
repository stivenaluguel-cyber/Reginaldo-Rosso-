name: Aplicar Fix UF - 2 IDs

# Uso unico (22/07/2026): aplica a correcao de uf EXCLUSIVAMENTE aos IDs
# 1444407896565 e 1444403309878 (gravados com uf='SC' errado desde
# 24/06/2026, sao Cachoeirinha-RS e Canoas-RS). Escopo travado por
# construcao - so esses 2 IDs entram no update_csv_parsed_bulk().

on:
  workflow_dispatch:

concurrency:
  group: aplicar-fix-uf-2-ids
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  aplicar:
    name: Aplicar fix uf (2 IDs)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Rodar aplicar_fix_uf_2_ids.py
        run: cd scraper && python aplicar_fix_uf_2_ids.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
