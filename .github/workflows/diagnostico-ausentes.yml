name: Diagnostico Ausentes

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    name: Rastrear IDs ausentes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias minimas
        run: pip install psycopg2-binary python-dotenv

      - name: Rodar diagnostico
        run: cd scraper && python diagnostico_ausentes.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
