name: Diagnostico Lance no Texto

# SOMENTE LEITURA - nao grava nada no banco. Verifica se o valor do
# lance atual e capturavel no texto_detalhe_bruto de imoveis Venda
# Online, ou se so aparece o CTA generico "de seu lance" (ja sabido).
# Insumo pra decidir a Fase 3 (badge "Com lance") - nao implementa nada.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    name: Investigar lance no texto
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias minimas
        run: pip install psycopg2-binary python-dotenv

      - name: Rodar diagnostico
        run: cd scraper && python diagnostico_lance_no_texto.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
