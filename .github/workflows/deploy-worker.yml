name: Deploy CF Worker (inscrever-alerta)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'worker/**'

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        working-directory: worker
        run: npm install

      - name: Set Worker secret DATABASE_URL
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "${{ secrets.DATABASE_URL }}" | npx wrangler secret put DATABASE_URL --name inscrever-alerta

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy

      - name: Show Worker URL
        run: |
          echo "Worker deployed! URL padrao: https://inscrever-alerta.<account>.workers.dev"
          echo "Verifique o Cloudflare Dashboard para a URL exata."
