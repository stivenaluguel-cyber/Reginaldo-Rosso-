name: Gerar Páginas de Imóveis

on:
  push:
    paths:
      - '**.csv'
      - 'imoveis-rs.json'
      - 'imoveis-sc.json'
      - 'gerar-imoveis.js'
  workflow_run:
    workflows: ["Atualizar imóveis Caixa", "Scraper Caixa Economica Federal"]
    types: [completed]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependencia pg (cliente Postgres)
        run: npm install pg --no-save

      - name: Gerar páginas HTML e sitemap
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node gerar-imoveis.js

      - name: Publicar páginas geradas
        run: |
          git config user.name "robo-imoveis"
          git config user.email "robo@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "Atualiza páginas de imóveis ($(date +%F))" || echo "Sem mudanças."
          git push
      - name: Auto-verificacao (meta.json publicado <2h)
        run: |
          echo "Aguardando deploy do GitHub Pages..."
          META_URL="https://reginaldorosso.com.br/meta.json"
          ATUALIZADO=""
          IDADE=""
          for i in 1 2 3 4 5 6 7 8; do
            sleep 30
            TS=$(date +%s)
            BODY=$(curl -fsSL "${META_URL}?t=${TS}" || echo "")
            if [ -z "$BODY" ]; then echo "tentativa $i: sem resposta"; continue; fi
            ATUALIZADO=$(printf '%s' "$BODY" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{console.log(JSON.parse(d).atualizado||"")}catch(e){console.log("")}})')
            if [ -z "$ATUALIZADO" ]; then echo "tentativa $i: meta sem campo atualizado"; continue; fi
            IDADE=$(node -e 'const a=new Date(process.argv[1]).getTime();const now=Date.now();console.log(Math.round((now-a)/60000))' "$ATUALIZADO")
            echo "tentativa $i: meta.json atualizado=$ATUALIZADO idade=${IDADE}min"
            if [ -n "$IDADE" ] && [ "$IDADE" -le 120 ]; then
              echo "OK: meta.json publicado ha ${IDADE} min (<=120)."
              exit 0
            fi
          done
          echo "::error::meta.json nao ficou fresco apos varias tentativas. Ultimo: atualizado=$ATUALIZADO idade=${IDADE}min"
          exit 1
