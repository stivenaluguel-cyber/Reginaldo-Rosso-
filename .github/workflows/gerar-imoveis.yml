name: Gerar Páginas de Imóveis

on:
  push:
    paths:
      - '**.csv'
      - 'imoveis-rs.json'
      - 'imoveis-sc.json'
      - 'gerar-imoveis.js'
  workflow_run:
    workflows: ["Atualizar imóveis Caixa", "Scraper Caixa Economica Federal"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependencia pg (cliente Postgres)
        run: npm install pg --no-save

      - name: Gerar páginas HTML e sitemap
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node gerar-imoveis.js

      - name: Publicar páginas geradas
        run: |
          git config user.name "robo-imoveis"
          git config user.email "robo@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "Atualiza páginas de imóveis ($(date +%F))" || echo "Sem mudanças."
          git push
