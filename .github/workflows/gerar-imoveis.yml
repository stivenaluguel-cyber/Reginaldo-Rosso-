name: Gerar Páginas de Imóveis

on:
  push:
    paths:
      - '**.csv'
      - 'imoveis-rs.json'
      - 'imoveis-sc.json'
      - 'gerar-imoveis.js'
  workflow_run:
    workflows: ["Atualizar imóveis Caixa", "Scraper Caixa Economica Federal"]
    types: [completed]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependencia pg (cliente Postgres)
        run: npm install pg --no-save

      - name: Gerar páginas HTML e sitemap
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node gerar-imoveis.js

      - name: Publicar páginas geradas
        run: |
          git config user.name "robo-imoveis"
          git config user.email "robo@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "Atualiza páginas de imóveis ($(date +%F))" || echo "Sem mudanças."
          git push
      - name: Auto-verificacao (meta.json publicado <2h)
        run: |
          echo "Aguardando deploy do GitHub Pages..."
          sleep 90
          META_URL="https://reginaldorosso.com.br/meta.json?t=$(date +%s)"
          echo "Buscando $META_URL"
          ATUALIZADO=$(curl -fsSL "$META_URL" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).atualizado||'')}catch(e){console.log('')}}")
          echo "meta.json atualizado=$ATUALIZADO"
          if [ -z "$ATUALIZADO" ]; then
            echo "::error::meta.json sem campo 'atualizado' ou inacessivel."
            exit 1
          fi
          IDADE=$(node -e "const a=new Date(process.argv[1]).getTime();const now=Date.now();console.log(Math.round((now-a)/60000))" "$ATUALIZADO")
          echo "Idade do meta.json: $IDADE minutos"
          if [ "$IDADE" -gt 120 ]; then
            echo "::error::meta.json tem $IDADE min (>120). A carga passou verde mas NAO publicou."
            exit 1
          fi
          echo "OK: meta.json publicado ha $IDADE min."
