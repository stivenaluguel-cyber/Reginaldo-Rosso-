name: Diagnostico Dry-Run Fix UF

# SOMENTE LEITURA - nao grava nada no banco. Dry-run da correcao de
# scraper/db.py::update_csv_parsed_bulk (uf agora corrigido pelo CSV mesmo
# quando ja preenchido) - confirma os 2 IDs conhecidos + mede o impacto
# mais amplo (quantos outros registros tambem tem uf divergente).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    name: Dry-run fix uf (sem escrita)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Rodar diagnostico_dry_run_fix_uf.py
        run: cd scraper && python diagnostico_dry_run_fix_uf.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
