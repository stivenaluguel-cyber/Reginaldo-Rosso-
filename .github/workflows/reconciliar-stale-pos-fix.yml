name: Reconciliar Stale Pos-Fix

# Uso unico: recalcula do zero a lista de candidatos a stale (Disponivel,
# fora do CSV oficial de hoje ha mais de 3 dias) e reconcilia cada um
# pelo mesmo caminho de producao (scrape_imovel + _classificar, sinal
# EXPLICITO de ativo/encerrado - nunca por ausencia).

on:
  workflow_dispatch:

concurrency:
  group: reconciliar-stale-pos-fix
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reconciliar:
    name: Recalcular e reconciliar stale
    runs-on: ubuntu-22.04
    # 2026-07-20: aumentado de 30 -> 75min. O lote cresceu de 14 (achado
    # original) para 62 candidatos hoje; com o ritmo educado anti-WAF
    # (25-45s/item) 30min nao bastava mais -- o job estava sendo
    # cancelado por timeout no meio do lote (script salva por item via
    # db.upsert_imovel/mark_unavailable, entao nao perdia progresso, so
    # ficava incompleto). 75min cobre confortavelmente ate ~120 itens.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Playwright chromium
        run: cd scraper && python -m playwright install --with-deps chromium

      - name: Rodar reconciliar_stale_pos_fix.py
        run: cd scraper && python reconciliar_stale_pos_fix.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
