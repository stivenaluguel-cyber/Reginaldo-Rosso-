name: Diagnostico Investigar Encerrados Suspeitos

# SOMENTE LEITURA - nao grava nada no banco. Investigacao de
# emergencia: reconciliar-stale-pos-fix marcou 6 imoveis como
# Indisponivel com classificacao='encerrado', mas o padrao do texto
# extraido bate com o incidente ja documentado de pagina generica da
# Caixa mal-classificada. Confirma ou refuta antes de qualquer
# rollback.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    name: Investigar 6 encerrados suspeitos
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Playwright chromium
        run: cd scraper && python -m playwright install --with-deps chromium

      - name: Rodar investigacao
        run: cd scraper && python diagnostico_investigar_encerrados_suspeitos.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
