name: Marcar Indisponivel - 11 Confirmados

# Uso unico (22/07/2026): marca Indisponivel EXATAMENTE os 11 IDs
# autorizados apos pre-check final ao vivo. Re-raspa e reclassifica cada
# um no momento da escrita (mecanismo normal do projeto) - so grava se
# ainda for "encerrado" nesse instante. Nao toca em nenhum outro registro.

on:
  workflow_dispatch:

concurrency:
  group: marcar-indisponivel-11-confirmados
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  marcar:
    name: Marcar 11 IDs confirmados
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Playwright chromium
        run: cd scraper && python -m playwright install --with-deps chromium

      - name: Rodar marcar_indisponivel_11_confirmados.py
        run: cd scraper && python marcar_indisponivel_11_confirmados.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
