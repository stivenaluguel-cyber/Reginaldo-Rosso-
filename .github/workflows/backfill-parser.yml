name: Backfill Parser Caixa

# Roda o parser sobre todos os imoveis ja no banco:
# - extrai tipo_real + area da descricao CSV
# - extrai fgts, financiamento, debito_tributos, debito_condominio, quartos
#   da descricao de detalhe ja raspada
# Nao faz nenhum request novo a Caixa.
# Apos o backfill, dispara a geracao dos JSONs e paginas.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (nao grava no banco)'
        required: false
        default: 'false'
        type: string

concurrency:
  group: backfill-parser
  cancel-in-progress: false

jobs:
  backfill:
    name: Backfill Parser
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    outputs:
      total_imoveis: ${{ steps.backfill.outputs.total_imoveis }}
      tipo_real_count: ${{ steps.backfill.outputs.tipo_real_count }}
      area_count: ${{ steps.backfill.outputs.area_count }}
      fgts_count: ${{ steps.backfill.outputs.fgts_count }}
      financiamento_count: ${{ steps.backfill.outputs.financiamento_count }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Env secrets
        run: |
          cat > scraper/.env << 'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          ENVEOF

      - name: Backfill Parser
        id: backfill
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          cd scraper && python backfill_parser.py $DRY_RUN_FLAG --batch 300
        env:
          PYTHONUNBUFFERED: "1"

      - name: Resumo
        run: |
          echo "## Backfill Parser Caixa" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Preenchidos |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total imóveis | ${{ steps.backfill.outputs.total_imoveis }} |" >> $GITHUB_STEP_SUMMARY
          echo "| tipo_real | ${{ steps.backfill.outputs.tipo_real_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| area | ${{ steps.backfill.outputs.area_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| fgts | ${{ steps.backfill.outputs.fgts_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| aceita_financiamento | ${{ steps.backfill.outputs.financiamento_count }} |" >> $GITHUB_STEP_SUMMARY

  regenerar:
    name: Regenerar JSONs e Paginas
    needs: backfill
    if: ${{ github.event.inputs.dry_run != 'true' }}
    uses: ./.github/workflows/gerar-imoveis.yml
    secrets: inherit
