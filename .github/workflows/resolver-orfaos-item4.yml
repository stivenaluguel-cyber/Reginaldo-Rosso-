name: Resolver Orfaos Item 4

# Uso unico: resolve os 2 orfaos do lote "CSV como fonte autoritativa de
# preco" (item 4) - 1444400624799 (Balneario Camboriu, Venda Online,
# nunca esteve no CSV geral) e 8444407544799 (Erechim, saiu do CSV
# geral ~08/07). Roda scraper/resolver_orfaos_item4.py, que reusa o
# MESMO caminho de producao (scrape_imovel + _classificar de
# reconciliar_ativos.py) - classificacao com sinal EXPLICITO de
# ativo/encerrado, nunca por ausencia no CSV.

on:
  workflow_dispatch:

concurrency:
  group: resolver-orfaos-item4
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolver:
    name: Resolver os 2 orfaos individualmente
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias
        run: cd scraper && pip install -r requirements.txt

      - name: Playwright chromium
        run: cd scraper && python -m playwright install --with-deps chromium

      - name: Rodar resolver_orfaos_item4.py
        run: cd scraper && python resolver_orfaos_item4.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
