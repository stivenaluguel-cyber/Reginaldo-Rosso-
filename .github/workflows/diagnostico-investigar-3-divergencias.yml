name: Diagnostico Investigar 3 Divergencias Parser Preco

# SOMENTE LEITURA - nao grava nada no banco. Uso unico: investiga a
# causa das 3 divergencias de preco_minimo encontradas por
# diagnostico_validar_parser_preco.py antes de ligar a extracao em
# etapa2_scraper.py (item 2 do lote "CSV como fonte autoritativa de
# preco").

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    name: Investigar divergencias
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias minimas
        run: pip install psycopg2-binary python-dotenv

      - name: Rodar investigacao
        run: cd scraper && python diagnostico_investigar_3_divergencias.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
