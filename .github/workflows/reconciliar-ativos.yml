name: Reconciliar Ativos

# Reativa/insere imoveis ATIVOS na Caixa que sumiram do site publicado
# (falso-removidos pelo vigia ou ausentes do CSV geral). Verifica a pagina de
# detalhe (Venda Online) antes de reativar. Depois regenera e publica.

on:
  workflow_dispatch:
    inputs:
      indisponiveis:
        description: "Tambem re-checar RS/SC Indisponivel"
        type: boolean
        default: false
      limite:
        description: "Cap de Indisponiveis a re-checar"
        default: "30"

permissions:
  contents: write

concurrency:
  group: scraper-caixa
  cancel-in-progress: false

jobs:
  reconciliar:
    name: Reconciliar imoveis ativos
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencias Python
        run: cd scraper && pip install -r requirements.txt

      - name: Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium || echo "install-deps falhou (nao-fatal); seguindo com chromium headless"

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Dependencias Node
        run: npm install pg --no-save

      - name: Env secrets
        run: |
          cat > scraper/.env << 'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          CF_ACCOUNT_ID=${{ secrets.CF_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=us-east-005
          S3_ENDPOINT_URL=${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET_NAME=reginaldo-rosso-docs
          CAPTCHA_PROVIDER=capsolver
          CAPSOLVER_API_KEY=${{ secrets.CAPSOLVER_API_KEY }}
          MAX_WORKERS=2
          MAX_RETRIES=3
          HEADLESS=true
          TIMEOUT_MS=30000
          ENVEOF

      - name: Reconciliar
        run: |
          cd scraper
          if [ "${{ inputs.indisponiveis }}" = "true" ]; then
            python reconciliar_ativos.py --indisponiveis --limite "${{ inputs.limite }}"
          else
            python reconciliar_ativos.py
          fi
        env:
          PYTHONUNBUFFERED: "1"

      - name: Gerar paginas HTML
        run: node gerar-imoveis.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Publicar
        run: |
          git config user.name "robo-reconciliar"
          git config user.email "robo@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "reconciliar: ativos recuperados ($(date +%F\ %H:%M\ UTC))" || echo "Sem mudancas."
          git pull --rebase origin main || true
          git push
